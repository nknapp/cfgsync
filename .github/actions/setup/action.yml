name: Setup
description: Install Rust toolchain via mise, add components, and configure cache

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@v4
    - run: rustup component add rustfmt clippy
      shell: bash
    - uses: Swatinem/rust-cache@v2
    - name: Install cross-compilation deps (ARM64 musl)
      if: runner.os == 'Linux'
      run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-ld" >> "$GITHUB_ENV"
      shell: bash
    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
      shell: bash
