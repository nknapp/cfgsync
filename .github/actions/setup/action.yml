name: Setup
description: Install Rust toolchain via mise, add components, and configure cache
inputs:
  linux-cross-compile-deps:
    description: "Whether to install cross compilation deps"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@v4
    - run: rustup component add rustfmt clippy
      shell: bash
    - uses: Swatinem/rust-cache@v2
    - name: Install cross-compilation deps (ARM64)
      if: inputs.linux-cross-compile-tools == 'true'
      run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      shell: bash
    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
      shell: bash
