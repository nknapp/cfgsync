name: Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - run: mise run ci

  bump:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.release.outputs.skip }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jdx/mise-action@v4
      - run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        id: release
        run: |
          LEVEL=$(convco version --bump --label)
          if [ -z "$LEVEL" ] || [ "$LEVEL" = "release" ]; then
            echo "No bump needed. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Bump level: $LEVEL"
          cargo release "$LEVEL" --no-publish --no-confirm --execute
          TAG="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          echo "Tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

  call-release:
    needs: bump
    if: needs.bump.outputs.skip != 'true'
    uses: ./.github/workflows/_release.yml
    with:
      tag: ${{ needs.bump.outputs.tag }}
    permissions:
      contents: write
      id-token: write
      attestations: write
