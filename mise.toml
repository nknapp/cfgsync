[tools]
"rust" = { version = "1.95", components = "rustfmt,clippy" }
"github:rhysd/actionlint" = "1.7.12"
"github:koalaman/shellcheck" = "0.11.0"
"github:crate-ci/cargo-release" = "1.1.2"
"github:convco/convco" = "0.6.4"

[tasks.format-and-test]
run = [
    "cargo fmt",
    "echo \"version: $(convco version --bump) ($(convco version --bump --label))\"",
    "convco check 93da8491..HEAD",
    "cargo clippy -- -D warnings",
    "actionlint",
    "cargo test",
    "cargo build --release",
]

[tasks.ci]
run = [
    "cargo fmt -- --check",
    "cargo clippy -- -D warnings",
    "actionlint",
    "cargo test",
    "cargo build --release",
]
