[tools]
"rust" = { version = "1.95", profile = "default" }
"github:rhysd/actionlint" = "1.7.12"
"github:koalaman/shellcheck" = "0.11.0"

[tasks.format-and-test]
run = [
    "cargo fmt",
    "cargo clippy -- -D warnings",
    "actionlint",
    "cargo test",
    "cargo build --release",
]

[tasks.ci]
run = [
    "cargo fmt -- --check",
    "cargo clippy -- -D warnings",
    "actionlint",
    "cargo test",
    "cargo build --release",
]
